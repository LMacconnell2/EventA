services:
  - type: web
    name: eventa-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: eventa-postgres
          property: connectionString

      - key: BETTER_AUTH_SECRET
        generateValue: true

      - key: CLIENT_URL
        value: https://eventa.onrender.com

      - key: SEED_REFERENCE_DATA
        value: "true"

      - key: SEED_ADMIN_USER
        value: "true"

  - type: web
    name: eventa-client
    runtime: static
    buildCommand: >
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @eventa/client build
    staticPublishPath: ./apps/client/dist

    envVars:
      - key: VITE_API_URL
        value: https://eventa-api.onrender.com

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: eventa-postgres
    databaseName: eventa
    user: eventa