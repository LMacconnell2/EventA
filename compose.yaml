name: eventa

services:
  postgres:
    image: postgres:17-alpine
    container_name: eventa-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - eventa-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - eventa-network

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile

    image: eventa-api:local
    container_name: eventa-migrate

    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}

      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      API_URL: ${API_URL:-http://localhost:3000}

      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-Super Admin}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-superadmin}

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}

    command:
      - /bin/sh
      - /app/docker/startup.sh

    depends_on:
      postgres:
        condition: service_healthy

    restart: "no"

    networks:
      - eventa-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile

    image: eventa-api:local
    container_name: eventa-api
    restart: unless-stopped

    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000

      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}

      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      API_URL: ${API_URL:-http://localhost:3000}

      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-Super Admin}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-superadmin}

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}

    ports:
      - "${API_PORT:-3000}:3000"

    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

    networks:
      - eventa-network

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}

    image: eventa-client:local
    container_name: eventa-client
    restart: unless-stopped

    ports:
      - "${CLIENT_PORT:-8080}:80"

    depends_on:
      api:
        condition: service_healthy

    networks:
      - eventa-network

networks:
  eventa-network:
    name: eventa-network

volumes:
  eventa-postgres-data:
    name: eventa-postgres-data